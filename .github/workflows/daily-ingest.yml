name: Daily feed ingestion

on:
  schedule:
    # 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  feed-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: daily-ingest
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feed engine
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_CIVIC_API_KEY: ${{ secrets.GOOGLE_CIVIC_API_KEY }}
        run: python scripts/feed_engine_daily.py --phase all

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-engine-log-${{ github.run_id }}
          path: feed_engine_daily.log
          if-no-files-found: ignore
          retention-days: 14
